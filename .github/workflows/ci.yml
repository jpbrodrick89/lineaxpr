name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Run pre-commit
        run: uvx pre-commit run --all-files --show-diff-on-failure

  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # ECF=TRUE matches JAX's release config and lights up different
        # rule branches than the default (e.g. static-out_idx path in
        # _scatter_add_rule). We run both regimes because correctness
        # bugs (40b01ca's gather-BE data loss on SPARSINE) have only
        # manifested under ECF.
        ecf: ["FALSE", "TRUE"]
    name: tests (ECF=${{ matrix.ecf }})
    env:
      EAGER_CONSTANT_FOLDING: ${{ matrix.ecf }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies (locked)
        run: uv sync --locked --extra test

      - name: Unit tests
        run: uv run pytest tests/ -q --tb=line

      - name: Slow sweep
        run: uv run pytest tests/test_sif2jax_sweep.py -m slow -q --tb=line
